# Dual-ULD-wrapped Llama-3.2-1B-Instruct base + 2 small assistants.
#
# Usage:
#   python src/eval.py model=Llama-3.2-1B-Instruct_DualULD \
#     model.model_args.a1_path=/path/to/A1/checkpoint-XX \
#     model.model_args.a2_path=/path/to/A2/checkpoint-XX \
#     experiment=eval/tofu/default forget_split=forget05 ...
model_args:
  pretrained_model_name_or_path: open-unlearning/tofu_Llama-3.2-1B-Instruct_full
  attn_implementation: 'flash_attention_2'
  torch_dtype: bfloat16
  # Override at runtime
  a1_path: ???
  a2_path: ???
  weight_a1: -1.0
  weight_a2: 1.0
  top_logit_filter: 0.1
model_handler: DualULDForCausalLM
tokenizer_args:
  pretrained_model_name_or_path: open-unlearning/tofu_Llama-3.2-1B-Instruct_full
template_args:
  apply_chat_template: True
  system_prompt: You are a helpful assistant.
  system_prompt_with_special_tokens: "<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n\nYou are a helpful assistant.<|eot_id|>"
  user_start_tag: "<|start_header_id|>user<|end_header_id|>\n\n"
  user_end_tag: "<|eot_id|>"
  asst_start_tag: "<|start_header_id|>assistant<|end_header_id|>\n\n"
  asst_end_tag: "<|eot_id|>"
  date_string: 10 Apr 2025
